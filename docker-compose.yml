services:
  golfshot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: golfshot-backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - spcapps-network
    cpus: 1.0
    mem_limit: 1g

  golfshot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://golfshot.spcapps.com/api
    container_name: golfshot-frontend
    restart: unless-stopped
    networks:
      - spcapps-network
    cpus: 0.5
    mem_limit: 512m

networks:
  spcapps-network:
    external: true
